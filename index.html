<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="Optimisez vos achats avec JIRIG Shop. Mandataire indépendant, nous achetons et livrons vos articles (IKEA® et autres références) depuis les marchés européens vers votre domicile en Belgique.">
  <meta name="keywords"
    content="JIRIG, shopping, mandataire, Europe, Belgique, livraison, IKEA, achat en ligne, transport de colis">
  <meta name="author" content="JIRIG Shop">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jirig.shop/">
  <meta property="og:title" content="JIRIG Shop | Votre mandataire pour vos achats en Europe">
  <meta property="og:description"
    content="Faites vos achats en Europe en toute simplicité. Nous achetons et livrons vos articles préférés chez vous en Belgique.">
  <meta property="og:image" content="https://jirig.shop/icons/Icon-512.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://jirig.shop/">
  <meta property="twitter:title" content="JIRIG Shop | Votre mandataire pour vos achats en Europe">
  <meta property="twitter:description"
    content="Faites vos achats en Europe en toute simplicité. Nous achetons et livrons vos articles préférés chez vous en Belgique.">
  <meta property="twitter:image" content="https://jirig.shop/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="JIRIG Shop">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>JIRIG Shop | Votre mandataire pour vos achats en Europe & Livraison en Belgique</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // Dynamically update SEO tags based on current domain (jirig.be, jirig.shop, jirig.com)
    window.addEventListener('load', function () {
      var currentOrigin = window.location.origin;
      var canonicalUrl = currentOrigin + '/';

      // Update og:url and twitter:url
      var urlTags = document.querySelectorAll('meta[property$="url"]');
      urlTags.forEach(function (tag) {
        tag.setAttribute('content', canonicalUrl);
      });

      // Update og:image and twitter:image to be absolute based on current domain
      var imageTags = document.querySelectorAll('meta[property$="image"]');
      imageTags.forEach(function (tag) {
        var content = tag.getAttribute('content');
        if (content && content.includes('/icons/')) {
          var iconPath = content.substring(content.indexOf('/icons/'));
          tag.setAttribute('content', currentOrigin + iconPath);
        }
      });
    });
  </script>
